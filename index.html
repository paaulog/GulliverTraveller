<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <title>Portal de Turismo - Projeto Gulliver</title>
</head>

<body>
    <header>
        <div class="logo">
            <p>Gulliver Traveller</p>
        </div>
        <nav>
            <ul>
                <li> <a href="#"> <img src="./images/local.png" alt="Ícone demonstrando os locais">Melhores locais</a></li>
                <li><a href="#"> <img src="./images/hotel.png" alt="Ícone demonstrando os hotéis">Melhores hotéis</a></li>
                <li><a href="#"><img src="./images/idea.png" alt="Ícone demonstrando as dicas da semana">Dicas da semana</a></li>
            </ul>
        </nav>
        <div class="login">
            <a href="#"><img src="./images/register.png" alt="Ícone representando o registro de usuário">Registrar-se</a>
            <a href="#"><img src="./images/enter.png" alt="Ícone representando o login de usuário">Login</a>
        </div>
    </header>

    <main>
        <h1 class="principal" id="titulo">Gulliver Traveller
        </h1>
        <img src="./images/Global.svg"
            alt="Caricatura de uma mulher e dois homens apontando para o planeta Terra, representando a possibilidade de viajar para o planeta todo.">
        <h2 class="principal">
            Encontre seu destino dos sonhos e viva-o acordado.
        </h2>
        <form class="pesquisa">
            <input type="search" placeholder="Buscar local" title="Buscar um destino" name="pesquisa">
            <button type="submit" title="Botão para pesquisar">Pesquisar <i class="fa fa-search"
                    title="Icone de lupa"></i></button>
        </form>

        <h1 id="titulo2">Destaques</h1>
        <section class="artigos">
            <a href="#">
                <article class="artigos_filho">
                    <p>São Paulo</p>
                    <img src="./images/sp.png" alt="Imagem de São Paulo">
                    <button class="btn_destaque" title="Botão para acessar local destaque de São Paulo">Acessar</button>
                </article>
            </a>
            <a href="#">
                <article class="artigos_filho">
                    <p>Belo Horizonte
                    </p>
                    <img src="./images/bh.png" alt="Imagem de Belo Horizonte">
                    <button class="btn_destaque"
                        title="Botão para acessar local destaque de Belo Horizonte">Acessar</button>
                </article>
            </a>
            <a href="#">
                <article class="artigos_filho">
                    <p>Alagoas</p>
                    <img src="./images/alagoas.png" alt="Imagem de Alagoas">
                    <button class="btn_destaque" title="Botão para acessar local destaque de Alagoas">Acessar</button>
                </article>
            </a>
        </section>
    </main>

    <footer>
        <p>Paulo Gomes &copy; 2022</p>
    </footer>

</body>

</html>
